<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DuckCore</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111111;
      --panel: #161616;
      --text: #f2f2f2;
      --muted: #b8b8b8;
      --line: #2b2b2b;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
    }

    main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 2rem 1.5rem;
    }

    .hero {
      width: 100%;
      max-width: 42rem;
      text-align: center;
    }

    .logo {
      display: block;
      width: min(100%, 26rem);
      height: auto;
      margin: 0 auto 0;
    }

    h1 {
      margin: 0 0 1rem;
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .tagline {
      margin: 0 0 1rem;
      font-size: clamp(1.1rem, 2.5vw, 1.35rem);
      color: var(--text);
    }

    .subtext {
      margin: 0 auto 2rem;
      max-width: 34rem;
      color: var(--muted);
      font-size: 1rem;
    }

    .cta {
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 1rem 1.25rem;
      text-align: left;
    }

    .cta-title {
      margin: 0 0 0.5rem;
      font-size: 1rem;
      font-weight: 700;
    }

    .cta-text {
      margin: 0;
      color: var(--muted);
    }

    .cta-text + .cta-text {
      margin-top: 0.35rem;
    }

    footer {
      border-top: 1px solid var(--line);
      padding: 1rem 1.5rem 1.25rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 480px) {
      main {
        padding: 1.5rem 1rem;
      }

      .cta {
        padding: 0.9rem 1rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-label="Coming soon">
      <img
        class="logo"
        src="pics/Copilot_20260602_163647.png"
        alt="DuckCore logo"
      >
      <h1>DuckCore</h1>
      <p class="tagline">Creator tools. Rebuilt from the ground up.</p>
      <p class="subtext">DuckCore is under development. Early Access is coming soon.</p>

      <div class="cta">
        <p class="cta-title">Follow DuckCore on TikTok for updates.</p>
        <p class="cta-text">TikTok: Coming soon</p>
        <p class="cta-text">Email: contact@duckcore.net</p>
      </div>
    </section>
  </main>

  <footer>&copy; 2026 DuckCore</footer>
</body>
</html>
